name: workly
description: "Workly - Không có việc gì khó, chỉ sợ bạn mất streak."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local storage
  path_provider: ^2.1.4
  shared_preferences: ^2.3.3

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Image handling
  image_picker: ^1.1.2

  # Charts
  fl_chart: ^0.71.0

  # Date/time formatting
  intl: ^0.20.2

  # Animations
  flutter_animate: ^4.5.0

  # Typography
  google_fonts: ^6.2.1

  # Unique IDs
  uuid: ^4.5.1

  # Permissions (Android)
  permission_handler: ^11.4.0

  # Icons
  cupertino_icons: ^1.0.8
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
