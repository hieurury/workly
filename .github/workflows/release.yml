name: Build and Release

on:
  push:
    tags:
      - 'v*' # Chỉ chạy action khi bạn push một tag bắt đầu bằng chữ v (ví dụ v1.0.0)

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    permissions:
      contents: write # Cho phép tự động tạo Release

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --build-name=${GITHUB_REF_NAME#v} --build-number=${GITHUB_RUN_NUMBER}

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/workly-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/workly-${{ github.ref_name }}.apk
          name: Workly ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
